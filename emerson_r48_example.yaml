substitutions:
  device_name: emerson-r48
  friendly_name: Emerson R48

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32: 
  board: nodemcu-32s
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

logger:
  level: DEBUG

api:

ota:
  - platform: esphome
    password: !secret ota_password

# CAN Bus Configuration for MCP2515
spi:
  id: spi_bus
  clk_pin: GPIO18
  miso_pin: GPIO19
  mosi_pin: GPIO23

canbus:
  - platform: mcp2515
    id: can_bus
    spi_id: spi_bus
    cs_pin: GPIO5
    can_id: 4
    bit_rate: 125kbps
    use_extended_id: true

# External Component - Use the original repo
external_components:
  - source: github://Kylevdm/esphome-emerson-vertiv-r48@feature/add-missing-python-functions
    refresh: 0s
    components: [ emerson_r48, mcp2515 ]

# Emerson R48 Component Configuration
# Note: Based on the __init__.py schema, these options are supported
emerson_r48:
  canbus_id: can_bus
  update_interval: 5s
  offline_voltage: 53.1
  offline_current_percent: 50.0

# Sensor readings from the device
sensor:
  - platform: emerson_r48
    output_voltage:
      name: "${friendly_name} Output Voltage"
    output_current:
      name: "${friendly_name} Output Current"
    max_output_current:
      name: "${friendly_name} Max Output Current %"
    output_temp:
      name: "${friendly_name} Temperature"
    input_voltage:
      name: "${friendly_name} Input Voltage"
    output_power:
      name: "${friendly_name} Output Power"
    max_current_amperes:
      name: "${friendly_name} Max Current Amperes"
    power_headroom:
      name: "${friendly_name} Power Headroom"

# Number controls for setting values
number:
  - platform: emerson_r48
    output_voltage:
      name: "${friendly_name} Set Output Voltage"
    max_output_current:
      name: "${friendly_name} Set Max Current %"

# Button to apply offline values
button:
  - platform: emerson_r48
    set_offline_values:
      name: "${friendly_name} Apply Offline Values"
  - platform: restart
    name: "${friendly_name} Restart"

# Switch controls
switch:
  - platform: emerson_r48
    ac_sw:
      name: "${friendly_name} AC Off"
    dc_sw:
      name: "${friendly_name} DC Off"
    fan_sw:
      name: "${friendly_name} Fan Max"
    led_sw:
      name: "${friendly_name} LED Flash"
