name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: esphome config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ESPHome
        run: pip install esphome
      - name: Validate component against the working tree
        run: esphome config tests/ci.yaml
